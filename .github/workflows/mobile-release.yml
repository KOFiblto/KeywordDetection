name: Build Mobile Apps (APK & iOS)

on:
  push:
    branches:
      - Frontend
      - main
      - feature/js-inference
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm install --no-audit --no-fund

      - name: Build Web App
        run: |
          cd frontend
          npm run build

      - name: Capacitor Sync
        run: |
          cd frontend
          npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Build Android APK
        run: |
          cd frontend/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Auditory-AI-Android-Debug
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm install --no-audit --no-fund

      - name: Build Web App
        run: |
          cd frontend
          npm run build

      - name: Capacitor Sync
        run: |
          cd frontend
          npx cap sync ios

      - name: Build iOS App (Unsigned)
        run: |
          cd frontend/ios/App
          xcodebuild -project App.xcodeproj -scheme App -configuration Debug -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO -destination 'generic/platform=iOS' clean build SYMROOT=build

      - name: Package iOS IPA (Unsigned)
        run: |
          cd frontend/ios/App/build/Debug-iphoneos
          mkdir Payload
          cp -r App.app Payload/
          zip -r ../../../../Auditory-AI-iOS-Unsigned.ipa Payload

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Auditory-AI-iOS-Unsigned-IPA
          path: Auditory-AI-iOS-Unsigned.ipa
