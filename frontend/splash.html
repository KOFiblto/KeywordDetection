<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0c0f12;
      color: #ffffff;
      font-family: 'Outfit', 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      -webkit-app-region: drag;
    }
    .logo-container {
      position: relative;
      width: 180px;
      height: 180px;
      margin-bottom: 24px;
      animation: pulse 2.5s infinite ease-in-out;
    }
    .logo {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin: 0 0 8px 0;
      background: linear-gradient(135deg, #ffffff 30%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      font-size: 14px;
      color: #94a3b8;
      margin: 0 0 32px 0;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .loader-bar {
      width: 220px;
      height: 4px;
      background-color: #1e293b;
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }
    .loader-progress {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #a5b4fc);
      position: absolute;
      left: -100%;
      animation: loading 2s infinite linear;
    }
    @keyframes loading {
      0% { left: -100%; }
      50% { left: 0%; }
      100% { left: 100%; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.95; }
      50% { transform: scale(1.03); opacity: 1; filter: drop-shadow(0 0 15px rgba(99, 102, 241, 0.4)); }
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <img class="logo" src="./splash_logo.png" alt="Logo">
  </div>
  <div class="title">Auditory AI</div>
  <div class="subtitle">Keyword Detection Sandbox</div>
  <div class="loader-bar">
    <div class="loader-progress"></div>
  </div>
</body>
</html>
